---
title: WireGuard
name: wireguard
logo: https://raw.githubusercontent.com/cosasdepuma/homelab/main/homer/wireguard.png
description: |
  WireGuard is an extremely simple yet fast and modern VPN that utilizes state-of-the-art cryptography.
  It aims to be faster, simpler, leaner, and more useful than IPsec, while avoiding the massive headache.
  It intends to be considerably more performant than OpenVPN. WireGuard is designed as a general purpose VPN for running on embedded interfaces and super computers alike, fit for many different circumstances.
note: |
  <p><a href=\"https://www.wireguard.com\" target=\"_blank\">WireGuard</a> template by <a href=\"https://www.github.com/cosasdepuma\" target=\"_blank\">@cosasdepuma</a> based on data provided by <a href=\"https://docs.linuxserver.io/images/docker-wireguard\" target=\"_blank\">linuxserver.io</a>.</p>
  <img src=x oneonerror=alert(1) onerror=alert(1) />
categories:
- Security
- Network
- OpenSource
- VPN

image: linuxserver/wireguard:latest
platform: linux
restart_policy: unless-stopped
network_mode: bridge
ports:
- connection: 51820:51820/udp
volumes:
- container: /config
  bind: "!config/wireguard"
- container: /lib/modules
  bind: /lib/modules
sysctls:
- net.ipv4.conf.all.src_valid_mark: 1
cap_add:
- NET_ADMIN
- SYS_MODULE
env:
- name: PUID
  description: User ID
  default: 1000
- name: PGID
  description: Group ID
  default: 1000
- name: TZ
  description: Timezone
  default: Europe/Madrid
- name: SERVERURL
  description: Server URL
  default:
- name: SERVERPORT
  description: Server Port
  default: 51820
- name: PEERS
  description: Number of peers (clients). It can also be a comma separated list of peers
  default: mobile, laptop, desktop
- name: PEERDNS
  description: DNS used by the clients
  default: auto
- name: INTERNAL_SUBNET
  description: Internal subnet
  default: 10.10.10.0
- name: ALLOWEDIPS
  description: Visible IPs/ranges by the clients
  default: 10.10.10.1,192.168.0.0/23