version: '3.8'

services:
  photoprism:
    image: photoprism/photoprism:latest
    container_name: photoprism
    environment:
      PHOTOPRISM_ADMIN_USER: ${PHOTOPRISM_USER:-photoprism}
      PHOTOPRISM_ADMIN_PASSWORD: ${PHOTOPRISM_PASS:-photoprism}
      PHOTOPRISM_AUTH_MODE: password
      PHOTOPRISM_SITE_URL: https://${PHOTOPRISM_DOMAIN:-127.0.0.1}:${PHOTOPRISM_PORT:-2342}/
      PHOTOPRISM_DISABLE_TLS: false
      PHOTOPRISM_DEFAULT_TLS: true
      PHOTOPRISM_ORIGINALS_LIMIT: 5000
      PHOTOPRISM_HTTP_COMPRESSION: gzip
      PHOTOPRISM_LOG_LEVEL: warning
      PHOTOPRISM_READONLY: false
      PHOTOPRISM_EXPERIMENTAL: false
      PHOTOPRISM_DISABLE_CHOWN: false
      PHOTOPRISM_DISABLE_WEBDAV: false
      PHOTOPRISM_DISABLE_SETTINGS: false
      PHOTOPRISM_DISABLE_TENSORFLOW: false
      PHOTOPRISM_DISABLE_FACES: false
      PHOTOPRISM_DISABLE_CLASSIFICATION: false
      PHOTOPRISM_DISABLE_VECTORS: false
      PHOTOPRISM_DISABLE_RAW: true
      PHOTOPRISM_RAW_PRESETS: false
      PHOTOPRISM_JPEG_QUALITY: 85
      PHOTOPRISM_DETECT_NSFW: true
      PHOTOPRISM_UPLOAD_NSFW: false
      PHOTOPRISM_DATABASE_DRIVER: sqlite
      PHOTOPRISM_SITE_CAPTION: Prism
      PHOTOPRISM_SITE_DESCRIPTION: iCloud is for the poor
      PHOTOPRISM_SITE_AUTHOR: K.F.
    working_dir: /photoprism
    volumes:
      - ${PHOTOPRISM_MEDIA:-/data/media/photos}:/photoprism/originals:ro
      - ${PHOTOPRISM_CONFIG:-/data/config/photoprism}:/photoprism/storage:rw
    hostname: prism
    ports:
      - ${PHOTOPRISM_PORT:-2342}:2342/tcp
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    restart: unless-stopped
    stop_grace_period: 10s