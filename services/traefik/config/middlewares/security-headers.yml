---
http:
  middlewares:
    security-headers:
      headers:
        frameDeny: true             # Prevents clickjacking attacks
        contentTypeNosniff: true    # Prevents browsers from trying to guess a MIME type
        browserXssFilter: true      # Prevents reflected XSS attacks
        referrerPolicy: no-referrer # Hide the Referer header
        isDevelopment: false        # Always act as if the app is in production

    extra-security-headers:
      headers:
        contentSecurityPolicy: |    # Defines the Content Security Policy
          default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';
        permissionsPolicy: |        # Prevents the access/usage of dangerous functions
          accelerometer=(), ambient-light-sensor=(), autoplay=(self), battery=(), camera=(self), cross-origin-isolated=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(self), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(self), midi=(), navigation-override=(self), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()