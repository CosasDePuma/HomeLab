version: '3.8'

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ${TRAEFIK_CONFIG:-./config}:/etc/traefik/:rW
    hostname: traffic
    ports:
      - 80:80/tcp
      - 443:443/tcp
      - ${TRAEFIK_DASHBOARD:-8080}:8080/tcp
    restart: unless-stopped