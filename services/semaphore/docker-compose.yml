version: '3.8'

services:
  semaphore:
    restart: unless-stopped
    image: semaphoreui/semaphore:latest
    environment:
      SEMAPHORE_DB_DIALECT: bolt
      SEMAPHORE_ADMIN: ${SEMAPHORE_NAME:-semaphore}
      SEMAPHORE_ADMIN_NAME: Administrator
      SEMAPHORE_ADMIN_PASSWORD: ${SEMAPHORE_PASSWORD:-semaphore}
      SEMAPHORE_ADMIN_EMAIL: ${SEMAPHORE_EMAIL:admin@localhost}
      SEMAPHORE_PLAYBOOK_PATH: /playbooks
    volumes:
      - ${SEMAPHORE_PLAYBOOKS:-/data/playbooks}:/playbooks:rw
      - ${SEMAPHORE_CONFIG:-/data/config/semaphore}:/etc/semaphore:rw
      - ${SEMAPHORE_DATA:-/data/database/semaphore}:/var/lib/semaphore:rw
    hostname: signal
    network_mode: bridge
    ports:
      - ${SEMAPHORE_PORT:-3000}:3000/tcp