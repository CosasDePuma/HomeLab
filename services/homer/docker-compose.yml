---
version: '3.8'

services:
  homer:
    image: b4bz/homer:latest
    container_name: homer
    environment:
      SUBFOLDER: ${HOMER_SUBFOLDER}
      INIT_ASSETS: ${HOMER_INIT_ASSETS:-0}
    volumes:
      - ${HOMER_ASSETS:-./config}:/www/assets:ro
      - ${HOMER_ICONS:-../../icons}:/www/assets/icons:ro
    hostname: simpson
    network_mode: bridge
    ports:
      - ${HOMER_PORT:-9443}:9443/tcp
    restart: unless-stopped