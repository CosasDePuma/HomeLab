---
# Default values for Bind9 DNS.

# --- | Bind9 configuration
bind9:
  route: HostSNI(`*`)
  banner: Homelab DNS
  hostIP: 127.0.0.1
  forwarders:
    - 1.1.1.1
    - 8.8.8.8
  zones:
    - name: example.com
      records:
        - name: www
          type: A
          target: 192.168.1.1

# --- | Metadata values

# This is to override the chart name.
nameOverride: ""
# Specify extra annotations.
annotations: {}
# Specify extra labels.
labels: {}

# --- | Deployment values

# The image to deploy
image: "ubuntu/bind9"
# The version of the image to deploy
tag: "latest"
# Specifies the image pull policy.
pullPolicy: IfNotPresent
# The number of replicas to deploy.
replicas: 1
# The strategy to use for the deployment.
# More information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
# The resources to allocate to the container.
resources:
  requests:
    memory: 16Mi
    cpu: 50m
  limits:
    memory: 512Mi
    cpu: 150m
