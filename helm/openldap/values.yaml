---
# Default values for OpenLDAP.

# --- | OpenLDAP configuration
openldap:
  # Homepage route
  route: HostSNI(`*`)
  # LDAP organization
  organization: ACME Corp.
  # LDAP domain
  domain: example.com
  # LDAP readonly username
  readonlyUser: readonly
  # LDAP passwords
  password:
    admin: adminpassword
    config: configpassword
    readonly: readonly

# --- | Metadata values

# This is to override the chart name.
nameOverride: ""
# Specify extra annotations.
annotations: {}
# Specify extra labels.
labels: {}

# --- | Deployment values

# The image to deploy
image: "osixia/openldap"
# The version of the image to deploy
tag: "latest"
# Specifies the image pull policy.
pullPolicy: IfNotPresent
# The number of replicas to deploy.
replicas: 1
# The strategy to use for the deployment.
# More information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
# The resources to allocate to the container.
resources:
  requests:
    memory: 16Mi
    cpu: 50m
  limits:
    memory: 1024Mi
    cpu: 150m
