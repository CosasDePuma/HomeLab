---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name:  {{ include "name" . }}
  {{- include "metadata" . | nindent 2 }}
spec:
  entryPoints:
  - websecure
  routes:
  - kind: Rule
    match: {{ .Values.homepage.route }}
    services:
    - name: {{ include "shortName" . }}
      port: {{ include "shortName" . }}
...