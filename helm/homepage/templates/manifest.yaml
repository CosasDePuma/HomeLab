---
# -------------- ConfigMap -------------
{{- include "configmap.tpl" (list . "configmap.overlays") | nindent 0 -}}
{{- define "configmap.overlays" -}}
{{- $values := .Values.homepage | default dict -}}
data:
  bookmarks.yaml: |-
    {{- $values.bookmarks | default "---" | nindent 4 }}
  kubernetes.yaml: |-
    {{- $values.kubernetes | default "---" | nindent 4 }}
  services.yaml: |-
    {{- $values.services | default "---" | nindent 4 }}
  settings.yaml: |-
    {{- $values.settings | default "---" | nindent 4 }}
  widgets.yaml: |-
    {{- $values.widgets | default "---" | nindent 4 }}
{{- end }}
---
# -------------- Deployment -------------
{{- include "deployment.tpl" (list . "deployment.overlays") | nindent 0 -}}
{{- define "checksums" -}}
metadata:
  annotations:
    checksum/configmap: {{ include "configmap.tpl" (list . "configmap.overlays") | sha256sum | quote }}
{{- end }}
{{- define "deployment.overlays" -}}
{{- $values := .Values.homepage | default dict -}}{{- $deployment := .Values.deployment | default (dict "image" dict) -}}
{{- include "checksums" . | nindent 0 }}
spec:
  template:
    {{- include "checksums" . | nindent 4 }}
    spec:
      {{- if $values.dns }}
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          {{- $values.dns | toYaml | nindent 10 }}
      {{- end }}
      containers:
        - image: "{{ $deployment.image.repository }}:{{ $deployment.image.tag | default "latest" }}"
          ports:
            - name: {{ include "svcName" . | quote }}
              containerPort: 3000
          resources:
            limits:
              cpu: 100m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
              readOnly: true
            - name: config
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
              readOnly: true
            - name: config
              mountPath: /app/config/services.yaml
              subPath: services.yaml
              readOnly: true
            - name: config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
              readOnly: true
            - name: config
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "name" . | quote }}
{{- end }}
---
# -------------- Service -------------
{{- include "service.tpl" (list . "service.overlays") | nindent 0 -}}
{{- define "service.overlays" -}}
spec:
  ports:
    - name: {{ include "svcName" . | quote }}
      protocol: TCP
      port: 3000
      targetPort: {{ include "svcName" . | quote }}
{{- end }}
---
# -------------- IngressRoute -------------
{{- include "ingressroute.tpl" (list . "ingressroute.overlays") | nindent 0 -}}
{{- define "ingressroute.overlays" -}}
{{- $values := .Values.homepage | default dict -}}
spec:
  routes:
    - match: Host(`{{ $values.domain | default "*" }}`) && PathPrefix(`{{ $values.path | default "/" }}`)
{{- end }}
